---
- name: Deploy AutoTriage Script on Windows Servers
  hosts: windows_nodes
  gather_facts: no
  vars:
    remote_temp_path: 'C:\temp_triage'
    local_artifact_dir: './fetched_artifacts'

  tasks:
    - name: 1. Ensure remote machine is reachable
      win_ping:

    - name: 2. Exclude Tools folder from Windows Defender
      ansible.windows.win_powershell:
        script: |
          $defenderService = Get-Service -Name WinDefend -ErrorAction SilentlyContinue
          if ($defenderService) {
            Add-MpPreference -ExclusionPath "{{ remote_temp_path }}\Tools" -Force
          }
      ignore_errors: yes

    - name: 3. Create remote temp directory
      win_file:
        path: "{{ remote_temp_path }}"
        state: directory

    - name: 4. Deliver AutoTriage to target hosts
      win_copy:
        src: ../windows-triage/
        dest: "{{ remote_temp_path }}/"

    - name: 5. Execute the program
      ansible.windows.win_powershell:
        script: |
          Set-Location -Path "{{ remote_temp_path }}"
          .\Core\MainCollector.ps1
      register: triage_output

    - name: 6. Locate generated artifact (compressed ZIP file)
      win_find:
        paths: "{{ remote_temp_path }}\\Output"
        patterns: "*.zip"
      register: found_zip

    - name: 7. Create log file of the Triage script
      win_copy:
        content: "{{ triage_output.output | default('No output captured') }}"
        dest: "{{ remote_temp_path }}\\{{ inventory_hostname }}_triage.log"

    - name: 8. Set artifact path to ZIP file
      set_fact:
        artifact_path: "{{ found_zip.files[0].path }}"

    - name: 9. Fetch artifact back to workstation
      fetch:
        src: "{{ artifact_path }}"
        dest: "{{ local_artifact_dir }}/{{ inventory_hostname }}/"
        flat: no

    - name: 10. Fetch log file back to workstation
      fetch:
        src: "{{ remote_temp_path }}\\{{ inventory_hostname }}_triage.log"
        dest: "{{ local_artifact_dir }}/{{ inventory_hostname }}/"
        flat: no

    - name: 11. Cleanup remote temp directory
      win_file:
        path: "{{ remote_temp_path }}"
        state: absent

- name: Deploy AutoTriage Script on Linux nodes
  hosts: linux_nodes
  gather_facts: no
  vars:
    remote_temp_path: '/tmp/temp_triage'
    local_artifact_dir: './fetched_artifacts'

  tasks:
    - name: 1. Ensure remote machine is reachable
      ping:

    - name: 2. Create remote temp directory
      file:
        path: "{{ remote_temp_path }}"
        state: directory
        mode: '0755'

    - name: 3. Deliver AutoTriage to target hosts
      copy:
        src: ../linux-triage/
        dest: "{{ remote_temp_path }}/"
        mode: preserve

    - name: 4. Execute the program
      shell: |
        cd "{{ remote_temp_path }}"
        python3 -u main.py
      register: triage_output
      become: yes
      timeout: 1800
      ignore_errors: yes

    - name: 5. Locate generated artifact (compressed TAR file)
      find:
        paths: "{{ remote_temp_path }}/output"
        patterns: "*.zip,*.tar.gz,*.tar"
      register: found_artifact

    - name: 6. Create log file of the Triage script
      copy:
        content: "{{ triage_output.stdout | default('No output captured') }}\n{{ triage_output.stderr | default('') }}"
        dest: "{{ remote_temp_path }}/{{ inventory_hostname }}_triage.log"

    - name: 7. Set artifact path to compressed file
      set_fact:
        artifact_path: "{{ found_artifact.files[0].path }}"
      when: found_artifact.files | length > 0

    - name: 8. Fetch artifact back to workstation
      fetch:
        src: "{{ artifact_path }}"
        dest: "{{ local_artifact_dir }}/{{ inventory_hostname }}/"
        flat: no
      when: artifact_path is defined

    - name: 9. Fetch log file back to workstation
      fetch:
        src: "{{ remote_temp_path }}/{{ inventory_hostname }}_triage.log"
        dest: "{{ local_artifact_dir }}/{{ inventory_hostname }}/"
        flat: no

    - name: 10. Cleanup remote temp directory
      file:
        path: "{{ remote_temp_path }}"
        state: absent
      become: yes
      ignore_errors: yes
