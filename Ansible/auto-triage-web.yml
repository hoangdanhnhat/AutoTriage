---
# auto-triage-web.yml
# Web-app-driven variant of auto-triage.yml.
#
# Extra vars (passed by ansible_runner.py):
#   job_id            - triage job identifier (used in artifact paths)
#   artifact_base_dir - absolute path on workstation where artifacts land
#   config_ps1_path   - absolute path to the pre-generated Config.ps1 on the workstation
#
- name: Web-triggered IR Triage Collection
  hosts: triage_targets
  gather_facts: no
  vars:
    remote_temp_path: 'C:\temp_triage'

  tasks:
    - name: 1. Ensure remote machine is reachable
      win_ping:

    - name: 2. Exclude Tools folder from Windows Defender
      win_shell: |
        Add-MpPreference -ExclusionPath "{{ remote_temp_path }}\Tools" -Force
      ignore_errors: yes

    - name: 3. Create remote temp directory
      win_file:
        path: "{{ remote_temp_path }}"
        state: directory

    - name: 4. Deliver IRTriageCollector scripts to target
      win_copy:
        src: /app/IRTriageCollector/
        dest: "{{ remote_temp_path }}/"

    - name: 5. Upload job-specific Config.ps1 (overrides defaults)
      win_copy:
        src: "{{ config_ps1_path }}"
        dest: "{{ remote_temp_path }}\\Core\\Config.ps1"

    - name: 6. Execute the triage collector
      win_shell: |
        cd "{{ remote_temp_path }}"
        powershell.exe -ExecutionPolicy Bypass -File .\Core\MainCollector.ps1
      register: triage_output

    - name: 7. Locate generated artifact ZIP
      win_find:
        paths: "{{ remote_temp_path }}\\Output"
        patterns: "*.zip"
      register: found_zip

    - name: 8. Write execution log to remote
      win_copy:
        content: "{{ triage_output.stdout }}\n{{ triage_output.stderr }}"
        dest: "{{ remote_temp_path }}\\{{ inventory_hostname }}_triage.log"

    - name: 9. Set artifact path fact
      set_fact:
        artifact_path: "{{ found_zip.files[0].path }}"
      when: found_zip.files | length > 0

    - name: 10. Fetch artifact ZIP back to workstation
      fetch:
        src: "{{ artifact_path }}"
        dest: "{{ artifact_base_dir }}/{{ inventory_hostname }}/"
        flat: no
      when: artifact_path is defined

    - name: 11. Fetch execution log back to workstation
      fetch:
        src: "{{ remote_temp_path }}\\{{ inventory_hostname }}_triage.log"
        dest: "{{ artifact_base_dir }}/{{ inventory_hostname }}/"
        flat: no

    - name: 12. Cleanup remote temp directory
      win_file:
        path: "{{ remote_temp_path }}"
        state: absent
