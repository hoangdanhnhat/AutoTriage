version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    network_mode: "host"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    network_mode: "host"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: "host"
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      ANSIBLE_SSH_KEY_PATH: ${ANSIBLE_SSH_KEY_PATH:-/root/.ssh/ansible}
      ARTIFACTS_DIR: ${ARTIFACTS_DIR:-/app/artifacts}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
    volumes:
      # Mount SSH private key (read-only)
      - ${HOST_ANSIBLE_KEY_PATH}:/root/.ssh/ansible:ro
      # Mount the IRTriageCollector scripts so Ansible can copy them to targets
      - ./IRTriageCollector:/app/IRTriageCollector:ro
      # Mount Ansible playbooks
      - ./Ansible:/app/Ansible:ro
      # Persistent artifact storage
      - artifacts_data:/app/artifacts
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: "host"
    depends_on:
      - backend

volumes:
  postgres_data:
  artifacts_data:
